# Nginx reverse proxy for health/metrics TLS termination
# 1) Put this file to /etc/nginx/sites-available/my-pers-fin-bot.conf
# 2) ln -s to /etc/nginx/sites-enabled/
# 3) nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name your-domain.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name your-domain.example.com;

    ssl_certificate /etc/letsencrypt/live/your-domain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Optional: tighten access by IP/CIDR for health endpoints
    # allow 10.0.0.0/8;
    # deny all;

    location /health {
        proxy_pass http://127.0.0.1:3005/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:3005/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /readyz {
        proxy_pass http://127.0.0.1:3005/readyz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /metrics {
        proxy_pass http://127.0.0.1:3005/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Optional strict auth at edge (recommended)
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd-my-pers-fin-bot;
    }
}
